<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المنزل الراقي</title>

<style>
body {
    margin: 0;
    font-family: 'Tahoma', sans-serif;
    background-color: #f5f5dc;
}

/* محتوى الصفحة */
.container {
    padding: 30px;
}

/* المنتجات */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.product {
    background: white;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.product:hover {
    transform: translateY(-5px);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.product h3 {
    color: #5a3e2b;
}

.product button {
    background: #5a3e2b;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

.product button:hover {
    background: #2c2c2c;
}
</style>

</head>

<body>

<!-- الهيدر -->
<div id="header"></div>

<!-- المحتوى -->
<div class="container">
    <h2>منتجاتنا</h2>

    <div class="products">
        <div class="product">
            <img src="https://via.placeholder.com/200">
            <h3>طاولة خشبية</h3>
            <button>شراء</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200">
            <h3>دهان بيج فاخر</h3>
            <button>شراء</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200">
            <h3>كرسي عصري</h3>
            <button>شراء</button>
        </div>
    </div>
</div>

<!-- الفوتر -->
<div id="footer"></div>

<script>
// استدعاء الهيدر
fetch("header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
})
.catch(err => console.error("Header Load Error:", err));

// استدعاء الفوتر
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
})
.catch(err => console.error("Footer Load Error:", err));
</script>

</body>
</html>
