<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
body {
    margin: 0;
    font-family: 'Tahoma', sans-serif;
}

.header {
    background: linear-gradient(90deg, #2c2c2c, #5a3e2b);
    color: #f5f5dc;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.nav a {
    color: #f5f5dc;
    text-decoration: none;
    margin: 0 10px;
    transition: 0.3s;
}

.nav a:hover {
    color: #d2b48c;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">المنزل الراقي</div>
    <div class="nav">
        <a href="#">الرئيسية</a>
        <a href="#">المنتجات</a>
        <a href="#">العروض</a>
        <a href="#">اتصل بنا</a>
    </div>
</div>

</body>
</html>
